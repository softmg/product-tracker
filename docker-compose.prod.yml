services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.filename=/config/traefik/dynamic.yml
      - --providers.file.watch=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/config/traefik:ro
      - ./config/certs:/config/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tracker-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - frontend-node-modules:/app/node_modules
    ports: []
    restart: unless-stopped
    command: sh -c "npm ci --include=dev && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_USE_MOCKS: "false"
      NODE_ENV: production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.service=frontend"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.services.frontend.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.frontend.loadbalancer.healthcheck.interval=10s"
    networks:
      - tracker-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/http.d/default.conf:ro
    ports: []
    restart: unless-stopped
    command: sh -c "if [ ! -f vendor/autoload.php ]; then composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction; fi && php artisan config:cache && php artisan route:cache && php artisan view:cache && php-fpm -D && nginx -g 'daemon off;'"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${BACKEND_PUBLIC_URL}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: lax
      FRONTEND_URL: ${FRONTEND_PUBLIC_URL}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/api/v1/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      - "traefik.http.services.backend.loadbalancer.healthcheck.path=/api/v1/health"
      - "traefik.http.services.backend.loadbalancer.healthcheck.interval=10s"
    networks:
      - tracker-net

  db:
    image: postgres:16
    restart: unless-stopped
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker} -d ${POSTGRES_DB:-product_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tracker-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - tracker-net

networks:
  tracker-net:
    driver: bridge

volumes:
  postgres-data:
  frontend-node-modules:
